name: Docker Image CI

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: maven

      - name: Build Application .jar
        working-directory: ./
        run: mvn clean package

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Docker Build Image
        working-directory: ./
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:latest .

      - name: Push to Docker Hub Container Registry
        run: |
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:latest ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:${{ env.SHORT_SHA }}
          docker push ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:${{ env.SHORT_SHA }}


