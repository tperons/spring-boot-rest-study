name: CD - Docker Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: maven

      - name: Build Application .jar
        run: mvn clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build Image
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:latest .

      - name: Push to Docker Hub Container Registry
        run: |
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:latest ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:${{ github.ref_name }}

          docker push ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:${{ github.ref_name }}
          docker push ${{ vars.DOCKERHUB_USERNAME }}/spring-study-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute commands via SSH on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/apis/spring-study
            echo "APP_VERSION=${{ github.ref_name }}" > .env
            docker compose pull
            docker compose up -d
