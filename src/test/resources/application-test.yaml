            ddl-auto: none
        properties:
            hibernate:
                show-sql: false
                open-in-view: false
    mail:
        host: smtp.gmail.com
        port: 587
        username: ${EMAIL_USERNAME:email@email.com}
        password: ${EMAIL_PASSWORD:QppGUGo6}
