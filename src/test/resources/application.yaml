server:
  port: 8888
cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://tiagoperon.com.br
file:
  upload-dir: uploads
spring:
  application:
    name: spring-boot-rest-study
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show-sql: false
        open-in-view: false
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 256MB
      max-request-size: 256MB
  flyway:
    enabled: true
springdoc:
  paths-to-match: /api/v1/**/**
  swagger-ui:
    use-root-path: true
